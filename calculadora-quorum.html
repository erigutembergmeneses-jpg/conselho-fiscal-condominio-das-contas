<!-- Gerador-de-QRCode-Calculadora.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code - Calculadora de Quóruns</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2edf2;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 14px;
        }
        .qr-output {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #f9fbfd;
            border-radius: 16px;
        }
        button {
            background: #f5a623;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .preview {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔲 Gerador de QR Code</h1>
        <p>Calculadora de Quóruns - Capítulo 4</p>
        
        <label>🌐 URL do seu site no GitHub Pages:</label>
        <input type="text" id="urlInput" placeholder="https://seu-usuario.github.io/seu-repositorio/calculadora-quorum.html">
        
        <div class="qr-output" id="qrContainer"></div>
        
        <button onclick="generateQR()">🔄 Gerar QR Code</button>
        
        <div class="preview">
            <small>⬇️ Clique com botão direito no QR Code para salvar a imagem</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        function generateQR() {
            let url = document.getElementById('urlInput').value;
            if (!url) {
                url = window.location.href.replace('gerador-qrcode.html', 'calculadora-quorum.html');
            }
            
            document.getElementById('qrContainer').innerHTML = '';
            const qrDiv = document.createElement('div');
            document.getElementById('qrContainer').appendChild(qrDiv);
            
            new QRCode(qrDiv, {
                text: url,
                width: 200,
                height: 200,
                colorDark: "#0b2b3b",
                colorLight: "#ffffff"
            });
            
            // Adiciona texto informativo
            const info = document.createElement('p');
            info.innerHTML = `<small>🔗 ${url}</small>`;
            info.style.marginTop = '10px';
            info.style.wordBreak = 'break-all';
            document.getElementById('qrContainer').appendChild(info);
        }
        
        generateQR();
    </script>
</body>
</html>
